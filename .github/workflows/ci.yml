name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4
        with:
          experimental: true

      - run: mise run test

  test-ember:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4
        with:
          experimental: true

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: project-ember/src-tauri/target
          key: ember-rust-${{ runner.os }}-${{ hashFiles('project-ember/src-tauri/Cargo.lock') }}
          restore-keys: ember-rust-${{ runner.os }}-

      - name: Cache npm modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: project-ember/node_modules
          key: ember-npm-${{ runner.os }}-${{ hashFiles('project-ember/package-lock.json') }}
          restore-keys: ember-npm-${{ runner.os }}-

      - name: Install npm dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: mise exec -C project-ember -- npm ci

      - name: Rust tests
        run: mise run ember-test

      - name: TypeScript type-check
        run: mise exec -C project-ember -- npx tsc --noEmit

  e2e-ember:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4
        with:
          experimental: true

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: project-ember/src-tauri/target
          key: ember-rust-${{ runner.os }}-${{ hashFiles('project-ember/src-tauri/Cargo.lock') }}
          restore-keys: ember-rust-${{ runner.os }}-

      - name: Cache npm modules
        id: cache-npm-bdd
        uses: actions/cache@v4
        with:
          path: project-ember/node_modules
          key: ember-npm-${{ runner.os }}-${{ hashFiles('project-ember/package-lock.json') }}
          restore-keys: ember-npm-${{ runner.os }}-

      - name: Install npm dependencies
        if: steps.cache-npm-bdd.outputs.cache-hit != 'true'
        run: mise exec -C project-ember -- npm ci

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code || true

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Download 3rd-party deps
        run: mise run download-deps

      - name: Build Ember in test mode
        run: cd project-ember && DEVORA_TEST_MODE=1 cargo tauri build --bundles app

      - name: Setup bundled-apps
        run: |
          APP_DIR="project-ember/src-tauri/target/release/bundle/macos/Devora-Ember.app"
          mkdir -p "$APP_DIR/Contents/Resources/bundled-apps"
          cp ccc.sh "$APP_DIR/Contents/Resources/bundled-apps/ccc"
          chmod +x "$APP_DIR/Contents/Resources/bundled-apps/ccc"
          cp bundler/macos/3rd-party-apps/original-crit "$APP_DIR/Contents/Resources/bundled-apps/original-crit"
          chmod +x "$APP_DIR/Contents/Resources/bundled-apps/original-crit"

      - name: Run acceptance tests
        env:
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
        run: mise run -C project-ember test-e2e
