[settings]
experimental = true # Required for the 'deps' feature

[tools]
go = "1.25"

[deps.go_deps]
auto = true
sources = ["go.mod", "go.sum", "**/*.go"]
run = "go mod tidy"
description = "Automatically sync Go module dependencies"

[tasks.build]
run = "go build -o debi ."
description = "Build the project"

[tasks.start]
run = "go run . workspace-ui"
description = "Run the application"

[tasks.test]
run = "go test ./..."
description = "Run all tests"

[tasks.experiment]
depends = ["build"]
run = "mv debi ~/.local/bin/."
description = "Move the built binary to ~/.local/bin for experimental use"

[tasks.deadcode]
run = [
  "go run golang.org/x/tools/cmd/deadcode@latest -test ./...",
  "go run honnef.co/go/tools/cmd/staticcheck@latest -checks U1000 ./...",
]
description = "Scan for dead code: unreachable funcs (deadcode -test) + unused identifiers (staticcheck U1000)"
