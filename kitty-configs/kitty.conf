macos_quit_when_last_window_closed yes
allow_remote_control yes
listen_on unix:/tmp/devora-kitty.sock

# Should be more than enough as the actual scrollback is handled by Neovim
scrollback_lines 0
font_size 15.0

include current-theme.conf

# Required for the vsplit/hsplit locations used by the Splits bindings below
enabled_layouts splits

# Shortcuts
clear_all_shortcuts yes

## Workspace UI
map ctrl+s launch --type=tab --tab-title "[Devora]" --cwd=~ "$SHELL" -l -i -c "debi workspace-ui"
map ctrl+shift+s launch --type=tab --tab-title "[Shell]" --cwd=~

## User Guide
map f1 launch --type=tab --tab-title "User Guide" glow --style $KITTY_CONFIG_DIRECTORY/glow-theme.json --pager $DEVORA_RESOURCES_DIR/USER_GUIDE.md

## Splits (vim-style panes within a tab)
map cmd+shift+backslash launch --location=vsplit --cwd=current
map cmd+shift+minus     launch --location=hsplit --cwd=current
map cmd+shift+h         neighboring_window left
map cmd+shift+j         neighboring_window bottom
map cmd+shift+k         neighboring_window top
map cmd+shift+l         neighboring_window right
map cmd+shift+w         close_window

## Tabs
map ctrl+left  previous_tab
map ctrl+right next_tab
map ctrl+shift+left  move_tab_backward
map ctrl+shift+right move_tab_forward

## Font size
map ctrl+equal change_font_size current +2.0
map ctrl+minus change_font_size current -2.0

map ctrl+1 set_font_size 12.0
map ctrl+2 set_font_size 15.0
map ctrl+3 set_font_size 26.0

## Clipboard
map ctrl+shift+v paste_from_clipboard
map cmd+v paste_from_clipboard

## Reload config
map ctrl+shift+r load_config_file
