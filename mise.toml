[tools]
shellcheck = "latest"
"cargo:tauri-cli" = "2.11.1"

[tasks.build]
run = """
set -e
mise run -C project-debi build
mise run -C project-status-line build
"""
description = "Build all sub-projects (debi, cc-simple-statusline)"

[tasks.clean]
run = """
set -e
rm -rf bin/ bundler/macos/3rd-party-apps/
"""
description = "Clean build artifacts and downloaded dependencies"

[tasks.build-dev-and-open]
run = "./bundler/macos/bundle.sh --dev --open"
description = "Build Devora.app in development mode and open it"

[tasks.test]
run = """
set -e
mise run -C project-debi test
mise run -C project-judge test
mise run -C project-status-line test
mise run test-bundler
"""
description = "Run tests for all sub-projects"

[tasks.test-bundler]
run = """
set -e
./bundler/test-download-deps.sh
./bundler/test-update-deps.sh
"""
description = "Run tests for the bundler scripts"

[tasks.lint-shell]
run = "shellcheck install.sh"
description = "Lint shell scripts with shellcheck (currently install.sh only)"

[tasks.update-deps]
run = "./bundler/update-deps.sh"
description = "Update all 3rd-party dependencies to their latest versions"

[tasks.download-deps]
run = "./bundler/download-deps.sh"
description = "Download 3rd-party dependencies for bundling"

[tasks.release]
run = "./cut-release.sh"
raw = true
description = "Cut a new release (interactive)"

[tasks.mac-install]
depends = ["download-deps"]
run = """
set -e
./bundler/macos/bundle.sh
rm -rf /Applications/Devora.app
mv bin/macOS/Devora/Devora.app /Applications/Devora.app
./bundler/macos/install-completions.sh
rm -rf bin/macOS/Devora
"""
description = "Build and install Devora.app to /Applications, plus zsh completion (close Devora first)"

[tasks.install-hooks]
run = """
set -e
HOOKS_DIR="$(git rev-parse --git-path hooks)"
REPO_ROOT="$(git rev-parse --show-toplevel)"
mkdir -p "$HOOKS_DIR"
ln -sf "$REPO_ROOT/scripts/hooks/pre-commit" "$HOOKS_DIR/pre-commit"
echo "Installed pre-commit hook: $HOOKS_DIR/pre-commit -> $REPO_ROOT/scripts/hooks/pre-commit"
"""
description = "Install local git hooks (pre-commit changelog check)"

[tasks.ember-dev]
description = "Run Devora Ember in development mode with hot reload"
run = "mise run -C project-ember dev"

[tasks.build-ember-app]
depends = ["build", "download-deps"]
description = "Build Devora Ember .app and populate all bundled resources"
run = """
set -e
BUNDLE_DIR="project-ember/src-tauri/target/release/bundle/macos"
find "$BUNDLE_DIR" -name '*.app' -maxdepth 1 -type d -exec rm -rf {} + 2>/dev/null || true
(cd project-ember && mise exec -- cargo tauri build --bundles app)
APP_DIR=$(find "$BUNDLE_DIR" -name '*.app' -maxdepth 1 -type d | head -1)
if [ -z "$APP_DIR" ]; then
  echo "ERROR: No .app directory found in $BUNDLE_DIR" >&2
  exit 1
fi
./bundler/macos-ember/populate-app-resources.sh "$APP_DIR" --version 0.0.0-test
"""

[tasks.ember-create-dmg]
description = "Create a DMG from an existing Devora Ember .app bundle"
run = "mise run -C project-ember create-dmg"

[tasks.ember-test]
description = "Run Devora Ember tests"
run = "mise run -C project-ember test"

[tasks.ci-ember-test-e2e]
description = "Run Ember acceptance tests in CI"
run = "mise run -C project-ember test-e2e"

[tasks.local-ember-test-e2e]
depends = ["build-ember-app"]
description = "Run Ember acceptance tests locally (with dependency rebuild)"
run = "mise run -C project-ember test-e2e"

[tasks.ember-bundle]
depends = ["download-deps"]
description = "Build the complete Devora Ember.app bundle with all resources"
run = "./bundler/macos-ember/bundle-ember.sh"

[tasks.ember-install]
depends = ["download-deps"]
description = "Build and install Devora Ember.app to /Applications (dev builds get versioned names)"
run = """
set -e
./bundler/macos-ember/bundle-ember.sh
APP_SRC="project-ember/src-tauri/target/release/bundle/macos/Devora-Ember.app"
VERSION=$(cat "$APP_SRC/Contents/Resources/VERSION")
if [[ "$VERSION" == *-dev.* ]]; then
  APP_DEST="/Applications/Devora-Ember-${VERSION}.app"
else
  APP_DEST="/Applications/Devora-Ember.app"
  rm -rf "$APP_DEST"
fi
mv "$APP_SRC" "$APP_DEST"
echo "Installed to $APP_DEST"
"""
