[tasks.build]
run = """
set -e
mise run -C project-debi build
mise run -C project-status-line build
"""
description = "Build all sub-projects (debi, cc-simple-statusline)"

[tasks.test]
run = """
set -e
mise run -C project-debi test
mise run -C project-judge test
mise run -C project-status-line test
"""
description = "Run tests for all sub-projects"

[tasks.download-deps]
run = "./bundler/download-deps.sh"
description = "Download 3rd-party dependencies for bundling"

[tasks.release]
run = "./cut-release.sh"
raw = true
description = "Cut a new release (interactive)"

[tasks.mac-install]
depends = ["download-deps"]
run = """
set -e
./bundler/macos/bundle.sh
rm -rf /Applications/Devora.app
mv bin/macOS/Devora/Devora.app /Applications/Devora.app
./bundler/macos/install-completions.sh
rm -rf bin/macOS/Devora
"""
description = "Build and install Devora.app to /Applications, plus zsh completion (close Devora first)"

[tasks.install-hooks]
run = """
set -e
HOOKS_DIR="$(git rev-parse --git-path hooks)"
REPO_ROOT="$(git rev-parse --show-toplevel)"
mkdir -p "$HOOKS_DIR"
ln -sf "$REPO_ROOT/scripts/hooks/pre-commit" "$HOOKS_DIR/pre-commit"
echo "Installed pre-commit hook: $HOOKS_DIR/pre-commit -> $REPO_ROOT/scripts/hooks/pre-commit"
"""
description = "Install local git hooks (pre-commit changelog check)"
