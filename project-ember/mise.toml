[settings]
experimental = true # Required for the 'deps' feature

[tools]
node = "22"

[deps.npm_deps]
auto = true
sources = ["package.json", "package-lock.json"]
run = "test -f package.json && npm install || true"
description = "Automatically sync npm dependencies"

[tasks.dev]
run = """
cargo tauri build --bundles app 2>&1
"src-tauri/target/release/bundle/macos/Devora-Ember.app/Contents/MacOS/devora-ember"
"""
raw = true
description = "Build and run Devora Ember (stderr visible for debugging)"

[tasks.create-dmg]
dir = "src-tauri"
run = """
set -e
BUNDLE_DIR="target/release/bundle/macos"
APP_DIR=$(find "$BUNDLE_DIR" -name '*.app' -maxdepth 1 -type d | head -1)
if [ -z "$APP_DIR" ]; then
  echo "ERROR: No .app found in $BUNDLE_DIR. Build first with: mise run build-ember-app" >&2
  exit 1
fi
# The "Devora" name appears only at the DMG/install boundary: the Tauri build still emits Devora-Ember.app, but the published DMG, its staged .app, and the mounted volume are all named "Devora".
DMG_STAGING="$BUNDLE_DIR/dmg-staging"
rm -rf "$DMG_STAGING"
mkdir -p "$DMG_STAGING"
cp -R "$APP_DIR" "$DMG_STAGING/Devora.app"
DMG_OUTPUT="$BUNDLE_DIR/Devora.dmg"
rm -f "$DMG_OUTPUT"
REPO_ROOT=$(git rev-parse --show-toplevel)
"$REPO_ROOT/bundler/hdiutil-create-retry.sh" \
  -format UDZO \
  -imagekey zlib-level=9 \
  -volname "Devora" \
  -srcfolder "$DMG_STAGING" \
  -o "$DMG_OUTPUT"
rm -rf "$DMG_STAGING"
echo "DMG created: $DMG_OUTPUT"
"""
description = "Create a Devora DMG from the built Ember .app bundle (run build-ember-app first)"

[tasks.test-rust]
dir = "src-tauri"
run = "cargo test"
description = "Run Rust tests"

[tasks.test-unit]
run = "npx vitest run"
description = "Run frontend unit tests"

[tasks.test-unit-watch]
run = "npx vitest"
description = "Run frontend unit tests in watch mode"
raw = true

[tasks.test-all]
depends = ["test-rust", "test-unit"]
description = "Run all tests (Rust + frontend unit)"

[tasks._cucumber]
dir = "."
run = "node --import tsx ./node_modules/.bin/cucumber-js tests/features/ --import 'tests/steps/*.ts' --import 'tests/support/*.ts' --publish-quiet \"${@}\""
hide = true

[tasks.test-e2e]
dir = "."
usage = '''
flag "-f --force" help="Rebuild the app bundle before testing, even if it is fresh"
arg "[cucumber-args]" var=#true
'''
run = """
set -e
REPO_ROOT=$(git rev-parse --show-toplevel)
if [ "${usage_force:-false}" = "true" ]; then
	mise run -C "$REPO_ROOT" build-ember-app
elif [ "${EMBER_E2E_PREBUILT:-0}" != "1" ]; then
	if ! node --import tsx scripts/check-app-freshness.ts; then
		echo "Rebuilding the app bundle…"
		mise run -C "$REPO_ROOT" build-ember-app
	fi
fi
eval "set -- ${usage_cucumber_args:-}"
mise run _cucumber -- "$@"
"""
description = "Run Gherkin acceptance tests (verifies app-bundle freshness, rebuilds when stale; EMBER_E2E_PREBUILT=1 tests the existing artifact as-is)"

[tasks.record-claude]
dir = "."
run = "RECORD_MODE=1 mise run _cucumber -- --tags '@real-claude'"
description = "Record Claude Code API interactions for cassettes"

[tasks.cassette-inspect]
dir = "."
run = """
node -e "
  const zlib = require('zlib'), fs = require('fs');
  const f = process.argv[1];
  console.log(JSON.stringify(JSON.parse(zlib.gunzipSync(fs.readFileSync(f))), null, 2));
" -- "${@}"
"""
description = "Pretty-print a compressed cassette file"
